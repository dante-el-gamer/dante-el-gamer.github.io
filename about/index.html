<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dante el Gamer — Programador, creador de contenido y artista.">
  <meta name="author" content="Dante el Gamer">
  <title data-i18n="page.about.title"></title>
  <link rel="icon" type="image/png" href="../assets/DanteElGamerCharLogo.png">
  <link rel="manifest" href="/PWA/manifest.json">
  <meta name="theme-color" content="#202225">
  <link rel="apple-touch-icon" href="/PWA/Icon/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <script src="../nav.js"></script>
  <div id="nav"></div>
  <script>renderNav('about');</script>

  <!-- ===== PAGE HEADER ===== -->
  <section class="page-header">
    <div class="page-header-bg"></div>
    <div class="page-header-content">
      <h1 class="page-header-title" data-i18n="about.title"></h1>
      <p class="page-header-sub" data-i18n="about.subtitle"></p>
    </div>
  </section>

  <!-- ===== ABOUT CONTENT ===== -->
  <section class="section">
    <div class="section-inner">
      <div class="about-grid">
        <div class="about-text">
          <p data-i18n="about.p1"></p>
          <p data-i18n="about.p2"></p>
        </div>
        <div class="about-stats">
          <div class="stat-card">
            <span class="stat-number" data-i18n="about.stat.programmer"></span>
            <span class="stat-label" data-i18n="about.stat.code"></span>
          </div>
          <div class="stat-card">
            <span class="stat-number" data-i18n="about.stat.creator"></span>
            <span class="stat-label" data-i18n="about.stat.content"></span>
          </div>
          <div class="stat-card">
            <span class="stat-number" data-i18n="about.stat.artist"></span>
            <span class="stat-label" data-i18n="about.stat.design"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner">
      <img src="../assets/DanteElGamerCharLogo.png" alt="Dante" class="footer-logo">
      <p class="footer-text" data-i18n="footer.copyright"></p>
    </div>
  </footer>

  <div id="settings"></div>
  <script src="../i18n.js"></script>
  <script src="../settings.js"></script>
  <script>renderSettings();</script>
  <link rel="stylesheet" href="../assets/Animations/search.css">
  <script src="../script.js"></script>
</body>
</html>
