<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Juegos creados por Dante el Gamer — Itch.io games and projects">
  <meta name="author" content="Dante el Gamer">
  <title data-i18n="page.games.title"></title>
  <link rel="icon" type="image/png" href="../assets/DanteElGamerCharLogo.png">
  <link rel="manifest" href="/PWA/manifest.json">
  <meta name="theme-color" content="#202225">
  <link rel="apple-touch-icon" href="/PWA/Icon/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <script src="../nav.js"></script>
  <div id="nav"></div>
  <script>renderNav('games');</script>

  <!-- ===== PAGE HEADER ===== -->
  <section class="page-header">
    <div class="page-header-bg"></div>
    <div class="page-header-content">
      <h1 class="page-header-title" data-i18n="games.title"></h1>
      <p class="page-header-sub" data-i18n="games.subtitle"></p>
    </div>
  </section>

  <!-- ===== GAMES GRID ===== -->
  <section class="section section-alt">
    <div class="section-inner">
      <div class="projects-grid">

        <!-- DEValen runner -->
        <div class="project-card">
          <div class="project-info">
            <div class="project-tags">
              <span class="tag">Platformer</span>
              <span class="tag">Game</span>
            </div>
            <h3 class="project-title">DEValen runner</h3>
            <p class="project-desc" data-i18n="games.devalen.desc"></p>
            <div class="project-links">
              <a href="https://danteelgamer-yt.itch.io/devalen-runner" target="_blank" rel="noopener" class="btn btn-small">Itch.io</a>
            </div>
          </div>
        </div>

        <!-- Friday Night Funkin' Optimized -->
        <div class="project-card">
          <div class="project-info">
            <div class="project-tags">
              <span class="tag">FNF</span>
              <span class="tag">Engine</span>
            </div>
            <h3 class="project-title">Friday Night Funkin' Optimized</h3>
            <p class="project-desc" data-i18n="games.fnfopt.desc"></p>
            <div class="project-links">
              <a href="https://danteelgamer-yt.itch.io/friday-night-funkin-optimized" target="_blank" rel="noopener" class="btn btn-small">Itch.io</a>
            </div>
          </div>
        </div>

        <!-- Gometry Dash Eye Test -->
        <div class="project-card">
          <div class="project-info">
            <div class="project-tags">
              <span class="tag">GD</span>
              <span class="tag">Test</span>
            </div>
            <h3 class="project-title">Gometry Dash Eye Test</h3>
            <p class="project-desc" data-i18n="games.gometry.desc"></p>
            <div class="project-links">
              <a href="https://danteelgamer-yt.itch.io/gometry-dash-eye-test" target="_blank" rel="noopener" class="btn btn-small">Itch.io</a>
            </div>
          </div>
        </div>

        <!-- FNF BF Test -->
        <div class="project-card">
          <div class="project-info">
            <div class="project-tags">
              <span class="tag">FNF</span>
              <span class="tag">Test</span>
            </div>
            <h3 class="project-title">FNF BF Test</h3>
            <p class="project-desc" data-i18n="games.fnfbf.desc"></p>
            <div class="project-links">
              <a href="https://danteelgamer-yt.itch.io/fnf-bf-test" target="_blank" rel="noopener" class="btn btn-small">Itch.io</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner">
      <img src="../assets/DanteElGamerCharLogo.png" alt="Dante" class="footer-logo">
      <p class="footer-text" data-i18n="footer.copyright"></p>
    </div>
  </footer>

  <div id="settings"></div>
  <script src="../i18n.js"></script>
  <script src="../settings.js"></script>
  <script>renderSettings();</script>
  <link rel="stylesheet" href="../assets/Animations/search.css">
  <script src="../script.js"></script>
</body>
</html>
