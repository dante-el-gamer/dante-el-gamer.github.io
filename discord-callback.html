<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Auth — Dante el Gamer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #202225;
      color: #dcddde;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 400px;
      padding: 48px 32px;
      background: #2f3136;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #5865F2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 1rem; line-height: 1.6; color: #b9bbbe; }
    .error-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .hint { font-size: 0.85rem; color: #8e9297; margin-top: 12px; }
    .hint code { background: #202225; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      border-radius: 8px;
      background: #5865F2;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #4752C4; }
  </style>
</head>
<body>
  <div class="card" id="statusCard">
    <div class="spinner" id="spinner"></div>
    <p id="statusText">Completando inicio de sesión con Discord...</p>
  </div>

  <script>
    var DISCORD_CLIENT_ID = '1520178317381079162';
    var BASE_URL = window.location.origin;

    function setStatus(html, isError) {
      document.getElementById('spinner').style.display = isError ? 'none' : '';
      document.getElementById('statusText').innerHTML = html;
    }

    function redirectWith(discordParam) {
      setTimeout(function () {
        window.location.href = BASE_URL + '/?discord=' + discordParam;
      }, 1500);
    }

    function base64url(buf) {
      var bytes = [];
      for (var i = 0; i < buf.length; i++) bytes.push(buf[i]);
      return btoa(String.fromCharCode.apply(null, bytes))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var state = params.get('state');
      var error = params.get('error');

      if (error) {
        setStatus('Inicio de sesión cancelado o denegado.', true);
        redirectWith('error');
        return;
      }

      if (!code) {
        setStatus('Código de autorización no encontrado.', true);
        redirectWith('error');
        return;
      }

      var savedState = localStorage.getItem('dante-discord-state');
      var verifier = localStorage.getItem('dante-discord-verifier');

      if (!state || state !== savedState) {
        setStatus(
          'Error de seguridad: el estado no coincide. Probá de nuevo desde Configuraci&oacute;n.',
          true
        );
        localStorage.removeItem('dante-discord-state');
        localStorage.removeItem('dante-discord-verifier');
        redirectWith('error');
        return;
      }

      if (!verifier) {
        setStatus(
          'Sesi&oacute;n expirada. Prob&aacute; de nuevo desde Configuraci&oacute;n.',
          true
        );
        localStorage.removeItem('dante-discord-state');
        redirectWith('error');
        return;
      }

      var body = new URLSearchParams();
      body.append('client_id', DISCORD_CLIENT_ID);
      body.append('redirect_uri', BASE_URL + '/discord-callback.html');
      body.append('grant_type', 'authorization_code');
      body.append('code', code);
      body.append('code_verifier', verifier);

      fetch('https://discord.com/api/oauth2/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString()
      })
      .then(function (res) {
        if (!res.ok) {
          return res.json().then(function (data) {
            throw new Error(data.error_description || data.error || 'Token exchange failed');
          });
        }
        return res.json();
      })
      .then(function (data) {
        localStorage.setItem('dante-discord-token', data.access_token);
        if (data.refresh_token) {
          localStorage.setItem('dante-discord-refresh', data.refresh_token);
        }

        return fetch('https://discord.com/api/users/@me', {
          headers: { Authorization: 'Bearer ' + data.access_token }
        }).then(function (uRes) {
          if (!uRes.ok) throw new Error('Failed to fetch user');
          return uRes.json();
        }).then(function (user) {
          var name = user.global_name || user.username || 'Discord User';
          if (user.discriminator && user.discriminator !== '0') {
            name = user.username + '#' + user.discriminator;
          }
          localStorage.setItem('dante-discord', 'connected');
          localStorage.setItem('dante-discord-name', name);
          localStorage.setItem('dante-discord-id', user.id);
          if (user.avatar) {
            var ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
            localStorage.setItem(
              'dante-discord-avatar',
              'https://cdn.discordapp.com/avatars/' + user.id + '/' + user.avatar + '.' + ext
            );
          } else {
            localStorage.removeItem('dante-discord-avatar');
          }

          localStorage.removeItem('dante-discord-state');
          localStorage.removeItem('dante-discord-verifier');

          setStatus('&iexcl;Sesi&oacute;n iniciada como <strong>' + name + '</strong>! Redirigiendo...');
          redirectWith('success');
        });
      })
      .catch(function (err) {
        console.error('Discord OAuth error:', err);
        var msg = err.message || '';
        if (msg.indexOf('disallowed') !== -1 || msg.indexOf('unauthorized') !== -1 || msg.indexOf('405') !== -1) {
          setStatus(
            'El intercambio PKCE fall&oacute;. Asegurate de marcar la app como <strong>Public Client</strong> en ' +
            'Discord Developer Portal &rarr; OAuth2 &rarr; General.',
            true
          );
        } else {
          setStatus('Error al conectar: ' + msg + '. Prob&aacute; de nuevo.', true);
        }
        localStorage.removeItem('dante-discord');
        localStorage.removeItem('dante-discord-state');
        localStorage.removeItem('dante-discord-verifier');
        redirectWith('error');
      });
    })();
  </script>
</body>
</html>
