<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Auth — Dante el Gamer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 400px;
      padding: 48px 32px;
      background: #161b22;
      border-radius: 12px;
      border: 1px solid #30363d;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #238636;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 1rem; line-height: 1.6; color: #8b949e; }
    .error-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .hint { font-size: 0.85rem; color: #6e7681; margin-top: 12px; }
    .hint code { background: #0d1117; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      border-radius: 8px;
      background: #238636;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #2ea043; }
  </style>
</head>
<body>
  <div class="card" id="statusCard">
    <div class="spinner" id="spinner"></div>
    <p id="statusText">Completando inicio de sesión con GitHub...</p>
  </div>

  <script>
    var GITHUB_CLIENT_ID = 'Iv23lisPmPE5cqJBRgcr';
    var BASE_URL = window.location.origin;

    function setStatus(html, isError) {
      document.getElementById('spinner').style.display = isError ? 'none' : '';
      document.getElementById('statusText').innerHTML = html;
    }

    function redirectWith(githubParam) {
      setTimeout(function () {
        window.location.href = BASE_URL + '/?github=' + githubParam;
      }, 1500);
    }

    function base64url(buf) {
      var bytes = [];
      for (var i = 0; i < buf.length; i++) bytes.push(buf[i]);
      return btoa(String.fromCharCode.apply(null, bytes))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var state = params.get('state');
      var error = params.get('error');

      if (error) {
        setStatus('Inicio de sesión cancelado o denegado.', true);
        redirectWith('error');
        return;
      }

      if (!code) {
        setStatus('Código de autorización no encontrado.', true);
        redirectWith('error');
        return;
      }

      var savedState = localStorage.getItem('dante-github-state');
      var verifier = localStorage.getItem('dante-github-verifier');

      if (!state || state !== savedState) {
        setStatus(
          'Error de seguridad: el estado no coincide. Probá de nuevo desde Configuración.',
          true
        );
        localStorage.removeItem('dante-github-state');
        localStorage.removeItem('dante-github-verifier');
        redirectWith('error');
        return;
      }

      if (!verifier) {
        setStatus(
          'Sesión expirada. Probá de nuevo desde Configuración.',
          true
        );
        localStorage.removeItem('dante-github-state');
        localStorage.removeItem('dante-github-verifier');
        redirectWith('error');
        return;
      }

      var body = new URLSearchParams();
      body.append('client_id', GITHUB_CLIENT_ID);
      body.append('redirect_uri', BASE_URL + '/github-callback.html');
      body.append('grant_type', 'authorization_code');
      body.append('code', code);
      body.append('code_verifier', verifier);

      fetch('https://github.com/login/oauth/access_token', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
          'Accept': 'application/json'
        },
        body: body.toString()
      })
      .then(function (res) {
        if (!res.ok) {
          return res.json().then(function (data) {
            throw new Error(data.error_description || data.error || 'Token exchange failed');
          });
        }
        return res.json();
      })
      .then(function (data) {
        if (data.error) {
          throw new Error(data.error_description || data.error);
        }

        localStorage.setItem('dante-github-token', data.access_token);

        return fetch('https://api.github.com/user', {
          headers: {
            'Authorization': 'Bearer ' + data.access_token,
            'Accept': 'application/vnd.github+json'
          }
        }).then(function (uRes) {
          if (!uRes.ok) throw new Error('Failed to fetch user');
          return uRes.json();
        }).then(function (user) {
          var name = user.name || user.login || 'GitHub User';
          localStorage.setItem('dante-github', 'connected');
          localStorage.setItem('dante-github-name', name);
          localStorage.setItem('dante-github-login', user.login);
          localStorage.setItem('dante-github-id', user.id);
          if (user.avatar_url) {
            localStorage.setItem('dante-github-avatar', user.avatar_url);
          } else {
            localStorage.removeItem('dante-github-avatar');
          }
          if (user.bio) {
            localStorage.setItem('dante-github-bio', user.bio);
          }
          if (user.html_url) {
            localStorage.setItem('dante-github-url', user.html_url);
          }

          localStorage.removeItem('dante-github-state');
          localStorage.removeItem('dante-github-verifier');

          setStatus('¡Sesión iniciada como <strong>' + name + '</strong>! Redirigiendo...');
          redirectWith('success');
        });
      })
      .catch(function (err) {
        console.error('GitHub OAuth error:', err);
        var msg = err.message || '';
        if (msg.indexOf('bad_verification_code') !== -1 || msg.indexOf('code_verifier') !== -1) {
          setStatus(
            'El intercambio PKCE falló. Asegurate de que la app esté configurada como <strong>GitHub App</strong> en ' +
            'GitHub Settings → Developer settings → OAuth Apps → tu app → Client ID.',
            true
          );
        } else {
          setStatus('Error al conectar: ' + msg + '. Probá de nuevo.', true);
        }
        localStorage.removeItem('dante-github');
        localStorage.removeItem('dante-github-state');
        localStorage.removeItem('dante-github-verifier');
        redirectWith('error');
      });
    })();
  </script>
</body>
</html>
