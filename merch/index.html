<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Merch oficial de Dante el Gamer — sudaderas, tazas, mochilas y más">
  <meta name="author" content="Dante el Gamer">
  <title data-i18n="page.merch.title"></title>
  <link rel="icon" type="image/png" href="../assets/DanteElGamerCharLogo.png">
  <link rel="manifest" href="/PWA/manifest.json">
  <meta name="theme-color" content="#202225">
  <link rel="apple-touch-icon" href="/PWA/Icon/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <script src="../nav.js"></script>
  <div id="nav"></div>
  <script>renderNav('merch');</script>

  <!-- ===== PAGE HEADER ===== -->
  <section class="page-header">
    <div class="page-header-bg"></div>
    <div class="page-header-content">
      <h1 class="page-header-title" data-i18n="merch.title"></h1>
      <p class="page-header-sub" data-i18n="merch.subtitle"></p>
    </div>
  </section>

  <!-- ===== MERCH GRID ===== -->
  <section class="section section-alt">
    <div class="section-inner">
      <div class="merch-grid">

        <!-- Sudadera -->
        <div class="project-card">
          <div class="merch-preview">
            <img src="Merch__Sudadera/sudaderaNegra.png" alt="Sudadera Negra" loading="lazy">
          </div>
          <div class="merch-colors">
            <img src="Merch__Sudadera/sudaderaNegra.png" alt="Negra" class="merch-swatch active" data-color="negra">
            <img src="Merch__Sudadera/sudaderaNavy.png" alt="Navy" class="merch-swatch" data-color="navy">
            <img src="Merch__Sudadera/sudaderaMulled%20Berry.png" alt="Mulled Berry" class="merch-swatch" data-color="mulled">
          </div>
          <div class="project-info">
            <div class="project-tags">
              <span class="tag">Sudadera</span>
              <span class="tag">Hoodie</span>
            </div>
            <h3 class="project-title" data-i18n="merch.hoodie.title"></h3>
            <p class="project-desc" data-i18n="merch.hoodie.desc"></p>
            <div class="project-links">
              <a href="https://streamlabs.com/danteelgamer_/merch/5676389" target="_blank" rel="noopener" class="btn btn-small" data-i18n="merch.buy"></a>
            </div>
          </div>
        </div>

        <!-- Mochila -->
        <div class="project-card">
          <div class="merch-preview">
            <img src="mochila.png" alt="Mochila" loading="lazy">
          </div>
          <div class="project-info">
            <div class="project-tags">
              <span class="tag">Mochila</span>
              <span class="tag">Backpack</span>
            </div>
            <h3 class="project-title" data-i18n="merch.backpack.title"></h3>
            <p class="project-desc" data-i18n="merch.backpack.desc"></p>
            <div class="project-links">
              <a href="https://streamlabs.com/danteelgamer_/merch/5707827" target="_blank" rel="noopener" class="btn btn-small" data-i18n="merch.buy"></a>
            </div>
          </div>
        </div>

        <!-- Taza -->
        <div class="project-card">
          <div class="merch-preview">
            <img src="taza.png" alt="Taza" loading="lazy">
          </div>
          <div class="project-info">
            <div class="project-tags">
              <span class="tag">Taza</span>
              <span class="tag">Mug</span>
            </div>
            <h3 class="project-title" data-i18n="merch.mug.title"></h3>
            <p class="project-desc" data-i18n="merch.mug.desc"></p>
            <div class="project-links">
              <a href="https://streamlabs.com/danteelgamer_/merch/5566640" target="_blank" rel="noopener" class="btn btn-small" data-i18n="merch.buy"></a>
            </div>
          </div>
        </div>

        <!-- Vaso -->
        <div class="project-card">
          <div class="merch-preview">
            <img src="vaso.png" alt="Vaso" loading="lazy">
          </div>
          <div class="project-info">
            <div class="project-tags">
              <span class="tag">Vaso</span>
              <span class="tag">Glass</span>
            </div>
            <h3 class="project-title" data-i18n="merch.glass.title"></h3>
            <p class="project-desc" data-i18n="merch.glass.desc"></p>
            <div class="project-links">
              <a href="https://streamlabs.com/danteelgamer_/merch/5678190" target="_blank" rel="noopener" class="btn btn-small" data-i18n="merch.buy"></a>
            </div>
          </div>
        </div>

        <!-- Mousepad -->
        <div class="project-card">
          <div class="merch-preview">
            <img src="mausepad.png" alt="Mousepad" loading="lazy">
          </div>
          <div class="project-info">
            <div class="project-tags">
              <span class="tag">Mousepad</span>
              <span class="tag">Escritorio</span>
            </div>
            <h3 class="project-title" data-i18n="merch.mousepad.title"></h3>
            <p class="project-desc" data-i18n="merch.mousepad.desc"></p>
            <div class="project-links">
              <a href="https://streamlabs.com/danteelgamer_/merch/5708018" target="_blank" rel="noopener" class="btn btn-small" data-i18n="merch.buy"></a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner">
      <img src="../assets/DanteElGamerCharLogo.png" alt="Dante" class="footer-logo">
      <p class="footer-text" data-i18n="footer.copyright"></p>
    </div>
  </footer>

  <div id="settings"></div>
  <script src="../i18n.js"></script>
  <script src="../settings.js"></script>
  <script>renderSettings();</script>
  <link rel="stylesheet" href="../assets/Animations/search.css">
  <script src="../script.js"></script>
  <script>
    // Color swatch interaction for hoodie
    document.querySelectorAll('.merch-colors').forEach(function(group) {
      var preview = group.parentElement.querySelector('.merch-preview img');
      group.querySelectorAll('.merch-swatch').forEach(function(swatch) {
        swatch.addEventListener('click', function() {
          group.querySelectorAll('.merch-swatch').forEach(function(s) { s.classList.remove('active'); });
          this.classList.add('active');
          preview.src = this.src;
          preview.alt = this.alt;
        });
      });
    });
  </script>
</body>
</html>
